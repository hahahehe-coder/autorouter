# AutoRouter · docker-compose
#
# 拓扑:host 网络。AutoRouter 进程绑宿主 127.0.0.1:3001,
#   同机的 new-api 容器(同样 host 网络 / 或发布到宿主回环)经 loopback 访问它。
#   管理面板:SSH 隧道到宿主 127.0.0.1:3001 后浏览器打开。
#
# 部署:
#   1. 把仓库放到服务器(或 scp config/ 上去)
#   2. docker compose up -d --build
#   3. 改配置:直接编辑宿主 ./config/*.yaml,然后面板点"保存并热重载",或 curl -XPOST :3001/api/reload

services:
  autorouter:
    build: .
    image: autorouter:latest
    container_name: autorouter
    network_mode: host        # 关键:让容器内 127.0.0.1 = 宿主回环
    volumes:
      # 运行时数据(配置/日志)与源码分离,放宿主 home 下
      - /home/admin/.autorouter/config:/app/config
      - /home/admin/.autorouter/log:/app/log
    restart: unless-stopped
